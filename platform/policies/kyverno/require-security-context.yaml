apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-security-context
  annotations:
    policies.kyverno.io/title: Require Security Context
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      This policy requires that all containers define a securityContext with
      runAsNonRoot set to true, readOnlyRootFilesystem set to true, and
      capabilities dropped.
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: check-security-context
      match:
        any:
        - resources:
            kinds:
            - Pod
      validate:
        message: "Security context is required with runAsNonRoot=true, readOnlyRootFilesystem=true, and capabilities dropped"
        pattern:
          spec:
            =(securityContext):
              =(runAsNonRoot): "true"
            containers:
            - name: "*"
              securityContext:
                runAsNonRoot: "true"
                readOnlyRootFilesystem: "true"
                allowPrivilegeEscalation: "false"
                capabilities:
                  drop:
                  - "ALL"
