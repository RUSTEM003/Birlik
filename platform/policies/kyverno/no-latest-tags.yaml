apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Disallows the use of 'latest' tag in container images to ensure
      reproducible deployments.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
  - name: require-image-tag
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Using 'latest' tag is not allowed. Please specify a specific version tag or digest."
      pattern:
        spec:
          containers:
          - name: "*"
            image: "!*:latest"
  - name: require-init-container-tag
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Using 'latest' tag in init containers is not allowed."
      pattern:
        spec:
          =(initContainers):
          - name: "*"
            image: "!*:latest"
