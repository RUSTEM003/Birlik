apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: baseline-container-security
  annotations:
    policies.kyverno.io/title: Baseline Container Security
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Enforces baseline container security requirements including seccomp,
      capabilities, read-only filesystem, and non-root execution.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
  - name: require-seccomp-and-drop-all-caps
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Container security requirements not met: seccomp profile, capabilities, and filesystem settings required"
      pattern:
        spec:
          securityContext:
            seccompProfile:
              type: "RuntimeDefault"
          containers:
          - name: "*"
            securityContext:
              runAsNonRoot: true
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - "ALL"
  - name: disallow-host-namespaces
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Host namespaces are not allowed"
      pattern:
        spec:
          =(hostNetwork): "false"
          =(hostPID): "false"
          =(hostIPC): "false"
  - name: disallow-privileged
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Privileged containers are not allowed"
      pattern:
        spec:
          containers:
          - name: "*"
            securityContext:
              =(privileged): "false"
