apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agi-portal-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-portal.labels" . | nindent 4 }}
spec:
  secretName: agi-portal-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - {{ .Values.global.domain }}
  - "*.{{ .Values.global.domain }}"
