{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-portal.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vpc-endpoints
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-portal.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: agi-backend
  policyTypes:
  - Egress
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 443
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 5432
  - to: []
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ai-providers
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-portal.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: agi-backend
  policyTypes:
  - Egress
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-portal.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: agi-frontend
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: agi-backend
    ports:
    - protocol: TCP
      port: 8000
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
{{- end }}
