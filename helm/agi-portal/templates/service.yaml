apiVersion: v1
kind: Service
metadata:
  name: agi-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.backend.type }}
  ports:
  - port: {{ .Values.service.backend.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "agi-portal.selectorLabels" . | nindent 4 }}
    app: agi-backend
---
apiVersion: v1
kind: Service
metadata:
  name: agi-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agi-portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
  - port: {{ .Values.service.frontend.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "agi-portal.selectorLabels" . | nindent 4 }}
    app: agi-frontend
