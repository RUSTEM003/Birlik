apiVersion: v1
kind: ConfigMap
metadata:
  name: agi-portal-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  agi-portal-slo.json: |
    {
      "dashboard": {
        "id": null,
        "title": "AGI Portal SLO Dashboard",
        "tags": ["agi-portal", "slo"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Request Success Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "sum(rate(http_requests_total{job=\"agi-backend\",code!~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"agi-backend\"}[5m])) * 100",
                "legendFormat": "Success Rate %"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    {"color": "red", "value": 0},
                    {"color": "yellow", "value": 95},
                    {"color": "green", "value": 99}
                  ]
                },
                "unit": "percent"
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Response Time P95",
            "type": "stat",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"agi-backend\"}[5m])) by (le))",
                "legendFormat": "P95 Latency"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": 0},
                    {"color": "yellow", "value": 0.5},
                    {"color": "red", "value": 1}
                  ]
                },
                "unit": "s"
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "id": 3,
            "title": "AI Gateway Request Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(http_requests_total{job=\"agi-backend\",handler=~\"/api/ai/.*\"}[5m])) by (handler)",
                "legendFormat": "{{handler}}"
              }
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8}
          },
          {
            "id": 4,
            "title": "Security Events",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(security_events_total{job=\"agi-backend\"}[5m])) by (event_type)",
                "legendFormat": "{{event_type}}"
              }
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16}
          }
        ],
        "time": {"from": "now-1h", "to": "now"},
        "refresh": "30s"
      }
    }
